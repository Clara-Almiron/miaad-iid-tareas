version: 2

sources:
  - name: raw
    description: Fuente raw en MotherDuck con el payload del pronostico en una sola tabla.
    schema: weather
    tables:
      - name: weather
        description: Tabla raw unica con el payload del pronostico del clima.
        columns:
          - name: _airbyte_raw_id
            tests:
              - not_null
              - unique
  - name: raw_news
    description: Fuente raw en MotherDuck con articulos obtenidos desde NewsAPI.
    schema: newsapi
    tables:
      - name: everything
        description: Tabla raw unica con articulos y metadatos de NewsAPI.
        columns:
          - name: _airbyte_raw_id
            tests:
              - not_null
              - unique

models:
  - name: stg_weather_forecast_raw
    description: Normaliza la tabla raw unica y extrae atributos desde columnas JSON.
    columns:
      - name: _airbyte_raw_id
        tests:
          - not_null
          - unique
      - name: datetime_id
        tests:
          - not_null
      - name: forecast_datetime
        tests:
          - not_null

  - name: stg_dim_datetime
    description: Dimension de fecha y hora derivada desde la tabla raw.
    columns:
      - name: datetime_id
        tests:
          - not_null
          - unique
      - name: forecast_datetime
        tests:
          - not_null

  - name: stg_dim_weather_condition
    description: Catalogo de condiciones meteorologicas derivado desde la tabla raw.
    columns:
      - name: weather_condition_sk
        tests:
          - not_null
          - unique
      - name: weather_api_id
        tests:
          - not_null

  - name: stg_dim_day_period
    description: Catalogo del periodo del dia derivado desde la tabla raw.
    columns:
      - name: pod_code
        tests:
          - not_null
          - unique

  - name: stg_fct_weather_forecast
    description: Hecho de pronostico derivado desde la tabla raw ya normalizada.
    columns:
      - name: forecast_id
        tests:
          - not_null
          - unique
      - name: datetime_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dim_datetime')
                field: datetime_id
      - name: weather_condition_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dim_weather_condition')
                field: weather_condition_sk
      - name: pod_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dim_day_period')
                field: pod_code

  - name: stg_newsapi_raw
    description: Normaliza la tabla raw unica de NewsAPI y extrae atributos base.
    columns:
      - name: _airbyte_raw_id
        tests:
          - not_null
          - unique
      - name: article_sk
        tests:
          - not_null
          - unique

  - name: stg_newsapi_dim_article
    description: Dimension de articulo derivada desde la tabla raw de NewsAPI.
    columns:
      - name: article_sk
        tests:
          - not_null
          - unique
      - name: url
        tests:
          - not_null

  - name: stg_newsapi_dim_source
    description: Dimension de fuente derivada desde la tabla raw de NewsAPI.
    columns:
      - name: source_sk
        tests:
          - not_null
          - unique

  - name: stg_newsapi_dim_author
    description: Dimension de autor derivada desde la tabla raw de NewsAPI.
    columns:
      - name: author_sk
        tests:
          - not_null
          - unique

  - name: stg_newsapi_dim_published_datetime
    description: Dimension de fecha y hora de publicacion derivada desde la tabla raw de NewsAPI.
    columns:
      - name: published_datetime_sk
        tests:
          - not_null
          - unique
      - name: published_at
        tests:
          - not_null

  - name: stg_newsapi_fct_news_articles
    description: Hecho de articulos derivado desde la tabla raw de NewsAPI.
    columns:
      - name: article_event_sk
        tests:
          - not_null
          - unique
      - name: article_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_newsapi_dim_article')
                field: article_sk
      - name: source_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_newsapi_dim_source')
                field: source_sk
      - name: author_sk
        tests:
          - relationships:
              arguments:
                to: ref('stg_newsapi_dim_author')
                field: author_sk
      - name: published_datetime_sk
        tests:
          - relationships:
              arguments:
                to: ref('stg_newsapi_dim_published_datetime')
                field: published_datetime_sk
